<!DOCTYPE html>
<html>
<head>
  <title>Recipe Generator</title>
</head>

<body style="text-align:center; margin-top:100px; font-family:Arial;">

  <h1>Recipe Generator</h1>
  <h2>Name: Chandan Shah</h2>

  <input id="ingredients" type="text" placeholder="Enter ingredients" style="padding:8px; width:250px;">
  <br><br>

  <button onclick="generateRecipe()" style="padding:10px 20px;">Generate Recipe</button>

  <p id="result" style="margin-top:20px; font-weight:bold;"></p>

  <script>
    async function generateRecipe() {
      const input = document.getElementById("ingredients").value;

      try {
        document.getElementById("result").innerText = "Loading...";

        const response = await fetch("https://9duytol1mj.execute-api.us-east-2.amazonaws.com/default/recipeGenerator", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            ingredients: input
          })
        });

        const data = await response.json();

        const parsedBody = JSON.parse(data.body);

        document.getElementById("result").innerText = parsedBody.recipe;

      } catch (error) {
        document.getElementById("result").innerText = "Error: " + error.message;
      }
    }
  </script>

</body>
</html>
