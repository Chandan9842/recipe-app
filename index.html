<script>
async function generate() {
  let input = document.getElementById("ingredients").value;

  let response = await fetch("https://9duyto11mj.execute-api.us-east-2.amazonaws.com/default/recipeGenerator", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ ingredients: input })
  });

  let data = await response.json();

  document.getElementById("result").innerText = data.body;
}
</script>
